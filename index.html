<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bnwraptor - Market Analysis</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --accent: #0066cc;
      --card-bg: #f8f9fa;
      --border: #e1e4e8;
      --muted: #6a737d;
    }

    [data-theme="dark"] {
      --bg: #0d1117;
      --text: #c9d1d9;
      --accent: #58a6ff;
      --card-bg: #161b22;
      --border: #30363d;
      --muted: #8b949e;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0d1117;
        --text: #c9d1d9;
        --accent: #58a6ff;
        --card-bg: #161b22;
        --border: #30363d;
        --muted: #8b949e;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    header h1 a {
      text-decoration: none;
      color: var(--text);
      font-size: 1.5rem;
      font-weight: 700;
    }

    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .post {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .post:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    [data-theme="dark"] .post:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .post h3 {
      margin-bottom: 8px;
    }

    .post h3 a {
      color: var(--text);
      text-decoration: none;
      font-size: 1.2rem;
    }

    .post h3 a:hover {
      color: var(--accent);
    }

    .post-date {
      color: var(--muted);
      font-size: 0.85rem;
    }

    footer {
      text-align: center;
      padding: 40px 0;
      color: var(--muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
      margin-top: 60px;
    }

    @media (max-width: 600px) {
      body { padding: 15px; }
      .post { padding: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="/bnwraptor-blog/">bnwraptor</a></h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
  </header>

  <main>
    <div class="post">
      <h3><a href="/bnwraptor-blog/fall-of-us-empire.html">The Fall of the US Empire: A Reality Check</a></h3>
      <p class="post-date">March 16, 2026</p>
    </div>

    <div class="post">
      <h3><a href="/bnwraptor-blog/oil-market-analysis.html">Oil Market Analysis - March 15 2026</a></h3>
      <p class="post-date">March 15, 2026</p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 bnwraptor</p>
  </footer>

  <script>
    const themeToggle = document.querySelector('.theme-toggle');
    const html = document.documentElement;
    
    // Check saved preference first, then fall back to system preference
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      html.setAttribute('data-theme', savedTheme);
      updateButton(savedTheme);
    } else {
      // No saved preference - use system preference
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (prefersDark) {
        html.setAttribute('data-theme', 'dark');
        updateButton('dark');
      } else {
        updateButton('light');
      }
    }

    function toggleTheme() {
      const currentTheme = html.getAttribute('data-theme');
      const isDark = currentTheme === 'dark' || (!currentTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
      const newTheme = isDark ? 'light' : 'dark';
      
      if (newTheme === 'light') {
        html.removeAttribute('data-theme');
      } else {
        html.setAttribute('data-theme', newTheme);
      }
      
      localStorage.setItem('theme', newTheme);
      updateButton(newTheme);
    }

    function updateButton(theme) {
      themeToggle.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    }
  </script>
</body>
</html>
