<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Pitch background -->
  <rect width="600" height="400" fill="#1a472a"/>
  <rect x="20" y="20" width="560" height="360" fill="#2d5a3d" rx="5"/>
  <!-- Pitch lines -->
  <rect x="20" y="20" width="560" height="360" fill="none" stroke="white" stroke-width="2" rx="5"/>
  <!-- Center line -->
  <line x1="300" y1="20" x2="300" y2="380" stroke="white" stroke-width="2"/>
  <!-- Center circle -->
  <circle cx="300" cy="200" r="60" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="300" cy="200" r="3" fill="white"/>
  <!-- Left penalty area -->
  <rect x="20" y="100" width="120" height="200" fill="none" stroke="white" stroke-width="2"/>
  <!-- Right penalty area -->
  <rect x="460" y="100" width="120" height="200" fill="none" stroke="white" stroke-width="2"/>
  <!-- Left goal area -->
  <rect x="20" y="140" width="40" height="120" fill="none" stroke="white" stroke-width="2"/>
  <!-- Right goal area -->
  <rect x="540" y="140" width="40" height="120" fill="none" stroke="white" stroke-width="2"/>
  <!-- Left penalty spot -->
  <circle cx="100" cy="200" r="3" fill="white"/>
  <!-- Right penalty spot -->
  <circle cx="500" cy="200" r="3" fill="white"/>
  <!-- Left penalty arc -->
  <path d="M 100 155 A 45 45 0 0 1 100 245" fill="none" stroke="white" stroke-width="2"/>
  <!-- Right penalty arc -->
  <path d="M 500 155 A 45 45 0 0 0 500 245" fill="none" stroke="white" stroke-width="2"/>

  <!-- Formation: 4-3-3 -->

  <!-- Goalkeeper -->
  <circle cx="500" cy="200" r="18" fill="#009900" stroke="white" stroke-width="2"/>
  <text x="500" y="205" text-anchor="middle" fill="white" font-size="11" font-family="Arial">Benbot</text>

  <!-- Back 4 defenders -->
  <circle cx="430" cy="70" r="18" fill="#0066cc" stroke="white" stroke-width="2"/>
  <text x="430" y="75" text-anchor="middle" fill="white" font-size="11" font-family="Arial">Mand</text>

  <circle cx="370" cy="70" r="18" fill="#0066cc" stroke="white" stroke-width="2"/>
  <text x="370" y="75" text-anchor="middle" fill="white" font-size="11" font-family="Arial">Tougai</text>

  <circle cx="310" cy="70" r="18" fill="#0066cc" stroke="white" stroke-width="2"/>
  <text x="310" y="75" text-anchor="middle" fill="white" font-size="11" font-family="Arial">Bensebaini</text>

  <circle cx="250" cy="70" r="18" fill="#0066cc" stroke="white" stroke-width="2"/>
  <text x="250" y="75" text-anchor="middle" fill="white" font-size="11" font-family="Arial">Ait-Nouri</text>

  <!-- Midfield 3 -->
  <circle cx="390" cy="180" r="18" fill="#ffcc00" stroke="white" stroke-width="2"/>
  <text x="390" y="185" text-anchor="middle" fill="#1a1a1a" font-size="10" font-family="Arial">Bennacer</text>

  <circle cx="300" cy="180" r="18" fill="#ffcc00" stroke="white" stroke-width="2"/>
  <text x="300" y="185" text-anchor="middle" fill="#1a1a1a" font-size="10" font-family="Arial">Zerrouki</text>

  <circle cx="210" cy="180" r="18" fill="#ffcc00" stroke="white" stroke-width="2"/>
  <text x="210" y="185" text-anchor="middle" fill="#1a1a1a" font-size="10" font-family="Arial">Boudaoui</text>

  <!-- Front 3 -->
  <circle cx="150" cy="290" r="18" fill="#ff3333" stroke="white" stroke-width="2"/>
  <text x="150" y="295" text-anchor="middle" fill="white" font-size="10" font-family="Arial">Mahrez</text>

  <circle cx="250" cy="290" r="18" fill="#ff3333" stroke="white" stroke-width="2"/>
  <text x="250" y="295" text-anchor="middle" fill="white" font-size="10" font-family="Arial">Amoura</text>

  <circle cx="350" cy="290" r="18" fill="#ff3333" stroke="white" stroke-width="2"/>
  <text x="350" y="295" text-anchor="middle" fill="white" font-size="10" font-family="Arial">Gouiri</text>

  <!-- Legend -->
  <rect x="20" y="330" width="560" height="50" fill="#1a1a1a" rx="3" opacity="0.7"/>
  <circle cx="60" cy="355" r="10" fill="#009900" stroke="white" stroke-width="1"/>
  <text x="80" y="359" fill="white" font-size="11" font-family="Arial">Goalkeeper</text>
  <circle cx="170" cy="355" r="10" fill="#0066cc" stroke="white" stroke-width="1"/>
  <text x="190" y="359" fill="white" font-size="11" font-family="Arial">Defenders</text>
  <circle cx="290" cy="355" r="10" fill="#ffcc00" stroke="white" stroke-width="1"/>
  <text x="310" y="359" fill="white" font-size="11" font-family="Arial">Midfielders</text>
  <circle cx="420" cy="355" r="10" fill="#ff3333" stroke="white" stroke-width="1"/>
  <text x="440" y="359" fill="white" font-size="11" font-family="Arial">Forwards</text>
  <text x="300" y="375" text-anchor="middle" fill="#aaaaaa" font-size="10" font-family="Arial">Algeria 4-3-3 — Petkovic Formation</text>
</svg>