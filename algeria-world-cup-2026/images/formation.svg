<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="pitchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d7a3e"/>
      <stop offset="50%" style="stop-color:#3a8f4a"/>
      <stop offset="100%" style="stop-color:#2d7a3e"/>
    </linearGradient>
    <pattern id="stripes" width="30" height="400" patternUnits="userSpaceOnUse">
      <rect width="15" height="400" fill="#2d7a3e"/>
      <rect x="15" width="15" height="400" fill="#348a45"/>
    </pattern>
  </defs>

  <!-- Main pitch -->
  <rect x="0" y="0" width="600" height="400" fill="url(#pitchGrad)"/>
  <rect x="0" y="0" width="600" height="400" fill="url(#stripes)" opacity="0.15"/>

  <!-- Outer boundary -->
  <rect x="10" y="10" width="580" height="380" fill="none" stroke="white" stroke-width="2.5" rx="3"/>

  <!-- Centre line -->
  <line x1="300" y1="10" x2="300" y2="390" stroke="white" stroke-width="2"/>

  <!-- Centre circle -->
  <circle cx="300" cy="200" r="55" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="300" cy="200" r="3" fill="white"/>

  <!-- Centre penalty areas -->
  <!-- Left (defending third) -->
  <rect x="10" y="92" width="110" height="216" fill="none" stroke="white" stroke-width="2"/>
  <!-- Right (attacking third) -->
  <rect x="480" y="92" width="110" height="216" fill="none" stroke="white" stroke-width="2"/>

  <!-- Goal areas (6-yard box) -->
  <rect x="10" y="140" width="35" height="120" fill="none" stroke="white" stroke-width="2"/>
  <rect x="555" y="140" width="35" height="120" fill="none" stroke="white" stroke-width="2"/>

  <!-- Penalty spots -->
  <circle cx="95" cy="200" r="3" fill="white"/>
  <circle cx="505" cy="200" r="3" fill="white"/>

  <!-- Penalty arcs -->
  <path d="M 95 155 A 45 45 0 0 1 95 245" fill="none" stroke="white" stroke-width="2"/>
  <path d="M 505 155 A 45 45 0 0 0 505 245" fill="none" stroke="white" stroke-width="2"/>

  <!-- Goals (simple rectangles) -->
  <rect x="0" y="175" width="10" height="50" fill="none" stroke="white" stroke-width="2"/>
  <rect x="590" y="175" width="10" height="50" fill="none" stroke="white" stroke-width="2"/>

  <!-- Corner arcs -->
  <path d="M 10 20 A 8 8 0 0 0 18 10" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M 582 10 A 8 8 0 0 0 590 20" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M 10 380 A 8 8 0 0 1 18 390" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M 582 390 A 8 8 0 0 1 590 380" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- ===== FORMATION: 4-3-3 (defending LEFT, attacking RIGHT) ===== -->

  <!-- Goalkeeper — bottom left area -->
  <circle cx="45" cy="340" r="16" fill="#00aa44" stroke="white" stroke-width="2"/>
  <text x="45" y="344" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Benbot</text>

  <!-- Back 4 — horizontal line near bottom -->
  <circle cx="120" cy="310" r="16" fill="#0055cc" stroke="white" stroke-width="2"/>
  <text x="120" y="314" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Mand</text>

  <circle cx="190" cy="310" r="16" fill="#0055cc" stroke="white" stroke-width="2"/>
  <text x="190" y="314" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Tougai</text>

  <circle cx="260" cy="310" r="16" fill="#0055cc" stroke="white" stroke-width="2"/>
  <text x="260" y="314" text-anchor="middle" fill="white" font-size="8" font-family="Arial" font-weight="bold">Bensebaini</text>

  <circle cx="330" cy="310" r="16" fill="#0055cc" stroke="white" stroke-width="2"/>
  <text x="330" y="314" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Ait-Nouri</text>

  <!-- Midfield 3 — diagonal midfield line -->
  <circle cx="160" cy="235" r="16" fill="#ffbb00" stroke="white" stroke-width="2"/>
  <text x="160" y="239" text-anchor="middle" fill="#1a1a1a" font-size="8" font-family="Arial" font-weight="bold">Bennacer</text>

  <circle cx="245" cy="235" r="16" fill="#ffbb00" stroke="white" stroke-width="2"/>
  <text x="245" y="239" text-anchor="middle" fill="#1a1a1a" font-size="8" font-family="Arial" font-weight="bold">Zerrouki</text>

  <circle cx="330" cy="235" r="16" fill="#ffbb00" stroke="white" stroke-width="2"/>
  <text x="330" y="239" text-anchor="middle" fill="#1a1a1a" font-size="8" font-family="Arial" font-weight="bold">Boudaoui</text>

  <!-- Front 3 — diagonal attacking line -->
  <circle cx="180" cy="155" r="16" fill="#dd2222" stroke="white" stroke-width="2"/>
  <text x="180" y="159" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Mahrez</text>

  <circle cx="265" cy="155" r="16" fill="#dd2222" stroke="white" stroke-width="2"/>
  <text x="265" y="159" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Amoura</text>

  <circle cx="350" cy="155" r="16" fill="#dd2222" stroke="white" stroke-width="2"/>
  <text x="350" y="159" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Gouiri</text>

  <!-- Attacking direction arrow -->
  <line x1="400" y1="200" x2="560" y2="200" stroke="white" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <polygon points="560,195 572,200 560,205" fill="white" opacity="0.7"/>
  <text x="485" y="193" text-anchor="middle" fill="white" font-size="9" font-family="Arial" opacity="0.7">ATTACKING</text>

  <!-- Legend -->
  <rect x="395" y="290" width="195" height="95" fill="#111111" rx="4" opacity="0.75"/>
  <text x="492" y="308" text-anchor="middle" fill="white" font-size="10" font-family="Arial" font-weight="bold">4-3-3 Formation</text>
  <circle cx="415" cy="325" r="8" fill="#00aa44" stroke="white" stroke-width="1"/>
  <text x="430" y="329" fill="white" font-size="9" font-family="Arial">Goalkeeper</text>
  <circle cx="415" cy="345" r="8" fill="#0055cc" stroke="white" stroke-width="1"/>
  <text x="430" y="349" fill="white" font-size="9" font-family="Arial">Defenders</text>
  <circle cx="415" cy="365" r="8" fill="#ffbb00" stroke="white" stroke-width="1"/>
  <text x="430" y="369" fill="white" font-size="9" font-family="Arial">Midfielders</text>
  <circle cx="540" cy="325" r="8" fill="#dd2222" stroke="white" stroke-width="1"/>
  <text x="555" y="329" fill="white" font-size="9" font-family="Arial">Forwards</text>
  <text x="492" y="345" text-anchor="middle" fill="#cccccc" font-size="9" font-family="Arial">Petkovic's Algeria</text>
  <text x="492" y="360" text-anchor="middle" fill="#cccccc" font-size="9" font-family="Arial">Group D, World Cup 2026</text>
</svg>