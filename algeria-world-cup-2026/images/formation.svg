<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="pitchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a8f4a"/>
      <stop offset="50%" style="stop-color:#4a9f5a"/>
      <stop offset="100%" style="stop-color:#3a8f4a"/>
    </linearGradient>
  </defs>

  <!-- Pitch background -->
  <rect width="600" height="400" fill="url(#pitchGrad)"/>

  <!-- Alternating grass stripes -->
  <rect x="0" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="30" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="60" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="90" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="120" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="150" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="180" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="210" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="240" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="270" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="300" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="330" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="360" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="390" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="420" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="450" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="480" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="510" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="540" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="570" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>
  <rect x="600" y="0" width="15" height="400" fill="#359048" opacity="0.3"/>

  <!-- Pitch outline -->
  <rect x="2" y="2" width="596" height="396" fill="none" stroke="white" stroke-width="2.5"/>

  <!-- Centre line -->
  <line x1="300" y1="2" x2="300" y2="398" stroke="white" stroke-width="2"/>

  <!-- Centre circle -->
  <circle cx="300" cy="200" r="55" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="300" cy="200" r="3" fill="white"/>

  <!-- Left penalty area: x=2 to x=112, centred on x=57 -->
  <rect x="2" y="95" width="110" height="210" fill="none" stroke="white" stroke-width="2"/>
  <!-- Left goal area: x=2 to x=35 -->
  <rect x="2" y="145" width="33" height="110" fill="none" stroke="white" stroke-width="2"/>
  <!-- Left penalty spot at x=57, y=200 -->
  <circle cx="57" cy="200" r="3" fill="white"/>
  <!-- Left penalty arc: centre at (57,200), r=8, clipped by penalty area -->
  <path d="M 57 168 A 32 32 0 0 1 57 232" fill="none" stroke="white" stroke-width="2"/>

  <!-- Right penalty area: x=488 to x=598, centred on x=543 -->
  <rect x="488" y="95" width="110" height="210" fill="none" stroke="white" stroke-width="2"/>
  <!-- Right goal area: x=565 to x=598 -->
  <rect x="565" y="145" width="33" height="110" fill="none" stroke="white" stroke-width="2"/>
  <!-- Right penalty spot at x=543, y=200 -->
  <circle cx="543" cy="200" r="3" fill="white"/>
  <!-- Right penalty arc -->
  <path d="M 543 168 A 32 32 0 0 0 543 232" fill="none" stroke="white" stroke-width="2"/>

  <!-- Corner arcs -->
  <path d="M 2 12 A 10 10 0 0 0 12 2" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M 588 2 A 10 10 0 0 0 598 12" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M 2 388 A 10 10 0 0 1 12 398" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M 588 398 A 10 10 0 0 1 598 388" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- Goals -->
  <rect x="-2" y="180" width="6" height="40" fill="none" stroke="white" stroke-width="2"/>
  <rect x="596" y="180" width="6" height="40" fill="none" stroke="white" stroke-width="2"/>

  <!-- ===== FORMATION: 4-3-3, ATTACKING UPWARD ===== -->

  <!-- GOALKEEPER (green) - centred in goal area, bottom of pitch -->
  <circle cx="57" cy="335" r="15" fill="#00aa44" stroke="white" stroke-width="2"/>
  <text x="57" y="339" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Benbot</text>

  <!-- BACK FOUR (blue) - evenly spread across penalty area width -->
  <!-- Left back -->     cx=25
  <circle cx="25" cy="285" r="15" fill="#0044cc" stroke="white" stroke-width="2"/>
  <text x="25" y="289" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Ait-Nouri</text>

  <!-- Left centre -->  cx=95
  <circle cx="95" cy="285" r="15" fill="#0044cc" stroke="white" stroke-width="2"/>
  <text x="95" y="289" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Bensebaini</text>

  <!-- Right centre --> cx=165
  <circle cx="165" cy="285" r="15" fill="#0044cc" stroke="white" stroke-width="2"/>
  <text x="165" y="289" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Tougai</text>

  <!-- Right back -->  cx=235
  <circle cx="235" cy="285" r="15" fill="#0044cc" stroke="white" stroke-width="2"/>
  <text x="235" y="289" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Mandi</text>

  <!-- MIDFIELD THREE (yellow) - diamond/v shape, y=195 -->
  <!-- Left interior -->  x=65
  <circle cx="65" cy="195" r="15" fill="#ffcc00" stroke="white" stroke-width="2"/>
  <text x="65" y="199" text-anchor="middle" fill="#1a1a1a" font-size="9" font-family="Arial" font-weight="bold">Bennacer</text>

  <!-- Central mid -->   x=150
  <circle cx="150" cy="195" r="15" fill="#ffcc00" stroke="white" stroke-width="2"/>
  <text x="150" y="199" text-anchor="middle" fill="#1a1a1a" font-size="9" font-family="Arial" font-weight="bold">Zerrouki</text>

  <!-- Right interior --> x=235
  <circle cx="235" cy="195" r="15" fill="#ffcc00" stroke="white" stroke-width="2"/>
  <text x="235" y="199" text-anchor="middle" fill="#1a1a1a" font-size="9" font-family="Arial" font-weight="bold">Boudaoui</text>

  <!-- ATTACKING THREE (red) - wide front line, y=105 -->
  <!-- Left winger -->  x=57
  <circle cx="57" cy="105" r="15" fill="#cc0000" stroke="white" stroke-width="2"/>
  <text x="57" y="109" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Mahrez</text>

  <!-- Centre forward --> x=150
  <circle cx="150" cy="105" r="15" fill="#cc0000" stroke="white" stroke-width="2"/>
  <text x="150" y="109" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Amoura</text>

  <!-- Right winger --> x=243
  <circle cx="243" cy="105" r="15" fill="#cc0000" stroke="white" stroke-width="2"/>
  <text x="243" y="109" text-anchor="middle" fill="white" font-size="9" font-family="Arial" font-weight="bold">Gouiri</text>

  <!-- Attacking direction arrow -->
  <line x1="300" y1="350" x2="300" y2="50" stroke="white" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.5"/>
  <polygon points="300,42 294,55 306,55" fill="white" opacity="0.6"/>
  <text x="310" y="60" fill="white" font-size="9" font-family="Arial" opacity="0.7">ATTACK</text>

  <!-- Legend box - bottom right -->
  <rect x="380" y="280" width="210" height="110" fill="#111111" rx="5" opacity="0.8"/>
  <text x="485" y="300" text-anchor="middle" fill="white" font-size="11" font-family="Arial" font-weight="bold">Algeria 4-3-3</text>
  <text x="485" y="315" text-anchor="middle" fill="#aaaaaa" font-size="9" font-family="Arial">Petkovic - World Cup 2026</text>

  <circle cx="400" cy="332" r="7" fill="#00aa44" stroke="white" stroke-width="1"/>
  <text x="415" y="336" fill="white" font-size="9" font-family="Arial">Goalkeeper</text>

  <circle cx="400" cy="350" r="7" fill="#0044cc" stroke="white" stroke-width="1"/>
  <text x="415" y="354" fill="white" font-size="9" font-family="Arial">Defenders</text>

  <circle cx="510" cy="332" r="7" fill="#ffcc00" stroke="white" stroke-width="1"/>
  <text x="525" y="336" fill="white" font-size="9" font-family="Arial">Midfielders</text>

  <circle cx="510" cy="350" r="7" fill="#cc0000" stroke="white" stroke-width="1"/>
  <text x="525" y="354" fill="white" font-size="9" font-family="Arial">Forwards</text>
</svg>